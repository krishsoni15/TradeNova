version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tradenova-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tradenova
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
    container_name: tradenova-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/tradenova
      - UPSTOX_API_KEY=${UPSTOX_API_KEY}
      - UPSTOX_API_SECRET=${UPSTOX_API_SECRET}
      - UPSTOX_REDIRECT_URI=${UPSTOX_REDIRECT_URI:-http://localhost:3000/auth/callback}
      - SECRET_KEY=${SECRET_KEY:-your-secure-random-string}
      - FRONTEND_URL=http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./tradenova
    container_name: tradenova-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_UPSTOX_API_KEY=${UPSTOX_API_KEY}
      - NEXT_PUBLIC_UPSTOX_REDIRECT_URI=${UPSTOX_REDIRECT_URI:-http://localhost:3000/auth/callback}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
